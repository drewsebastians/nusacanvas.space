name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  data-license:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: npm ci

      - name: Verify source and license manifests
        run: npm run data:verify-sources

      - name: Reproduce deterministic data artifacts
        run: npm run data:reproduce

      - name: Generate data diff gate
        run: npm run data:diff

      - name: Geometry and registry tests
        run: npm run test:data

      - name: Upload data failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: data-license-failure-artifacts
          path: |
            artifacts/batch-1/
            data/sources/
            data/license-manifest-v1.json
            data/license-manifest-schema-v1.json
          if-no-files-found: ignore

  checks:
    runs-on: ubuntu-latest
    needs: data-license
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: npm ci

      - name: Install browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Verify Batch 1
        run: npm run verify:batch1

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: batch-1-failure-artifacts
          path: |
            playwright-report/
            test-results/
            artifacts/batch-1/
          if-no-files-found: ignore
